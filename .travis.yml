arch:
        - s390x
        - amd64
        - arm64
os:       linux
dist:     noble
language: c

compiler:
        - gcc
        - clang

before_install:
        - sudo apt-get update -qq
        - sudo apt-get install -y cmake clang-format libjson-c-dev libssl-dev

script:
        - set -o pipefail
        - cmake -B build -S . 2> >(tee)
        - cmake --build build 2> >(tee)
